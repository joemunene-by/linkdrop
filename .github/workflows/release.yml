name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
    # Skip docs-only pushes on main — tags still build everything.
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform.name }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: macOS (Intel)
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macOS (Apple Silicon)
            runner: macos-14
            target: aarch64-apple-darwin
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      # ─── Linux deps ─────────────────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget file libssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libfuse-dev libimobiledevice-utils ifuse

      # ─── macOS deps ─────────────────────────────────────────────────────
      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: |
          brew install libimobiledevice ideviceinstaller || true

      # ─── Windows deps: libimobiledevice ships bundled via iTunes drivers;
      # nothing to apt/brew install here. Tauri handles MSI/NSIS natively.

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-

      - name: Install frontend deps
        run: bun install --frozen-lockfile || bun install

      - name: Build (debug)
        if: github.event_name == 'pull_request'
        run: bun run tauri build --debug --target ${{ matrix.platform.target }}

      - name: Build (release)
        if: github.event_name != 'pull_request'
        run: bun run tauri build --target ${{ matrix.platform.target }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: linkdrop-linux-x64
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: linkdrop-macos-${{ matrix.platform.target }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: linkdrop-windows-x64
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linkdrop-linux-x64/**/*
            dist/linkdrop-macos-*/**/*
            dist/linkdrop-windows-x64/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
